<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trilayer — 3D Block Puzzle</title>
<script>
(function(){
  var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  var base = location.pathname.replace(/\/index\.html$/, '/').replace(/\/$/, '') || '.';
  if (lang.startsWith('zh')) { location.replace(base + '/zh/'); }
  else if (lang.startsWith('ja')) { location.replace(base + '/ja/'); }
  else { location.replace(base + '/en/'); }
})();
</script>
<noscript><meta http-equiv="refresh" content="0;url=en/"></noscript>
</head>
<body></body>
</html>
