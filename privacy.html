<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<script>
(function(){
  var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  var base = location.pathname.replace(/\/privacy\.html$/, '') || '.';
  if (lang.startsWith('zh')) { location.replace(base + '/zh/privacy.html'); }
  else if (lang.startsWith('ja')) { location.replace(base + '/ja/privacy.html'); }
  else { location.replace(base + '/en/privacy.html'); }
})();
</script>
<noscript><meta http-equiv="refresh" content="0;url=en/privacy.html"></noscript>
</head>
<body></body>
</html>
